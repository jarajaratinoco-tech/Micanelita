<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Espacio Digital</title>
    <style>
        :root {
            --color-fondo: #fce4ec;
            --color-sobre: #e91e63;
            --color-texto: #333;
            --color-carta: #ffffff;
        }

        body {
            background-color: var(--color-fondo);
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Cuenta Regresiva */
        .timer-section { text-align: center; margin-bottom: 30px; }
        #countdown { font-size: 1.5rem; color: var(--color-sobre); font-weight: bold; }

        /* Sobre Animado */
        .envelope {
            position: relative;
            width: 150px;
            height: 100px;
            background: var(--color-sobre);
            border-radius: 0 0 5px 5px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1;
        }
        .envelope::before {
            content: "";
            position: absolute;
            top: -50px; left: 0;
            border-left: 75px solid transparent;
            border-right: 75px solid transparent;
            border-bottom: 50px solid var(--color-sobre);
        }
        .envelope:hover { transform: translateY(-10px); }

        /* Modal de la Carta */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10;
            justify-content: center;
            align-items: center;
        }
        .letter-content {
            background: var(--color-carta);
            padding: 30px;
            width: 80%;
            max-width: 500px;
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }
        .close-btn {
            position: sticky;
            top: 0; float: right;
            cursor: pointer; font-size: 20px;
        }
        .letter-item {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }
        .letter-date { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <div class="timer-section">
        <h2>Tiempo juntos:</h2>
        <div id="countdown">Cargando...</div>
    </div>

    <div class="envelope" onclick="verCartas()"></div>
    <p>Toca el sobre para leer mis mensajes</p>

    <!-- Ventana donde aparecen las cartas -->
    <div id="modalCarta" class="modal">
        <div class="letter-content">
            <span class="close-btn" onclick="cerrar()">×</span>
            <h3>Mis Cartas para Ti</h3>
            
            <div id="contenedorCartas">
                <!-- AQUÍ AGREGARÁS LAS NUEVAS CARTAS -->
                <div class="letter-item">
                    <div class="letter-date">5 de Julio, 2024</div>
                    <p>¡Hola! Esta es la primera carta de nuestro baúl digital...</p>
                </div>

                <!-- Para agregar otra, copia desde aquí -->
                <div class="letter-item">
                    <div class="letter-date">6 de Julio, 2024</div>
                    <p>Hoy quise escribirte esto porque...</p>
                </div>
                <!-- Hasta aquí -->

            </div>
        </div>
    </div>

    <script>
        // Configura tu fecha especial aquí
        const fechaInicio = new Date("Jan 01, 2024 00:00:00").getTime();

        setInterval(() => {
            const ahora = new Date().getTime();
            const diff = ahora - fechaInicio;
            const d = Math.floor(diff / (1000*60*60*24));
            const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            const m = Math.floor((diff % (1000*60*60)) / (1000*60));
            const s = Math.floor((diff % (1000*60)) / 1000);
            document.getElementById("countdown").innerHTML = `${d}d ${h}h ${m}m ${s}s`;
        }, 1000);

        function verCartas() { document.getElementById("modalCarta").style.display = "flex"; }
        function cerrar() { document.getElementById("modalCarta").style.display = "none"; }
    </script>
</body>
</html>
